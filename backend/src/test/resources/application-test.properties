spring.datasource.url=jdbc:h2:mem:supervisionmoteur_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT test secret (exactly 32 bytes)
jwt.secret=test-jwt-secret-key-for-unit-tests-only-32bytes!
jwt.access-token-ttl-ms=3600000
jwt.refresh-token-ttl-ms=604800000

# CORS
cors.allowed-origins=http://localhost:5173

# AI service
ai.service.base-url=http://localhost:5001
