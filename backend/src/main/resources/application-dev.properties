# Local one-command development profile.
# Uses a file-backed H2 database so the app does not depend on the local
# PostgreSQL service password.

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/dev-supervision;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=false

app.dev-data.enabled=${APP_DEV_DATA_ENABLED:true}
app.admin-bootstrap-reset.enabled=${APP_ADMIN_BOOTSTRAP_RESET:false}
app.live-simulation.enabled=${APP_LIVE_SIMULATION_ENABLED:true}
app.live-simulation.initial-delay-ms=${APP_LIVE_SIMULATION_INITIAL_DELAY_MS:8000}
app.live-simulation.interval-ms=${APP_LIVE_SIMULATION_INTERVAL_MS:5000}
