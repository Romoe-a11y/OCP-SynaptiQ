# ═══════════════════════════════════════════════════════════════
# Motor Supervision — Application Configuration
# ═══════════════════════════════════════════════════════════════

spring.application.name=supervisionmoteur

# ── Database ──
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/supervision_moteur_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:samia}}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── HikariCP Connection Pool ──
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:5}
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:20}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT:300000}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME:600000}
spring.datasource.hikari.connection-timeout=${HIKARI_CONN_TIMEOUT:30000}
spring.datasource.hikari.leak-detection-threshold=${HIKARI_LEAK_THRESHOLD:60000}
spring.datasource.hikari.pool-name=SupervisionHikariPool

# ── Flyway ──
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.validate-on-migrate=${SPRING_FLYWAY_VALIDATE_ON_MIGRATE:false}

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false

# ── Server ──
server.port=${SERVER_PORT:8080}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/css,application/javascript
server.compression.min-response-size=1024

# ── JWT Security ──
jwt.secret=${JWT_SECRET:production-change-me-to-a-64-char-random-secret-key-min-32-bytes!!}
jwt.access-token-ttl-ms=${JWT_ACCESS_TTL:3600000}
jwt.refresh-token-ttl-ms=${JWT_REFRESH_TTL:604800000}

# ── CORS ──
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# ── AI Service ──
ai.service.base-url=${AI_SERVICE_BASE_URL:http://localhost:5001}
ai.service.connect-timeout-ms=${AI_CONNECT_TIMEOUT:5000}
ai.service.read-timeout-ms=${AI_READ_TIMEOUT:120000}

# ── Drift Monitoring ──
drift.monitoring.cron=${DRIFT_CRON:0 0 2 * * *}

# ── Actuator (health, metrics, info) ──
management.endpoints.web.exposure.include=health,info,metrics,caches
management.endpoint.health.show-details=when-authorized
management.endpoint.health.roles=ADMIN
management.info.env.enabled=true

# ── Logging ──
logging.level.root=INFO
logging.level.supervision_moteur=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter=DEBUG
logging.level.org.hibernate.SQL=WARN
logging.level.com.zaxxer.hikari=INFO

# ── Jackson ──
spring.jackson.default-property-inclusion=non_null
